services:
  - type: web
    name: projeto-tcc
    runtime: node
    plan: free
    buildCommand: npm install --include=dev --prefix FRONT-END && npm install --prefix BACK-END && npm run build:front && cd BACK-END && npx prisma migrate deploy && node scripts/create-admin.js admin@example.com admin123 Administrador && node scripts/seed-produtos.js
    startCommand: npm --prefix BACK-END run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
